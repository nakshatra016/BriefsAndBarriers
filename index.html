<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefs & Barriers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FDFBF7] min-h-screen flex items-center justify-center font-sans">

    <div class="flex flex-col lg:flex-row gap-8 p-6 max-w-7xl w-full">
        
        <div class="lg:w-1/3 bg-white/70 backdrop-blur-md border border-[#E6E1DA] rounded-3xl p-6 shadow-sm flex flex-col justify-between">
            <div>
                <h1 class="text-3xl font-serif font-bold text-[#2C3639] mb-2">Briefs & Barriers</h1>
                <p class="text-sm text-[#7A8B82] mb-6">A pathfinding battle in the supreme court.</p>
                
                <hr class="border-[#F0EBE3] mb-6" />

                <div class="mb-4">
                    <label class="block text-xs font-semibold text-[#A0937D] uppercase mb-1">Game Mode</label>
                    <select id="gameMode" class="w-full bg-[#F5F2EB] border border-[#E6E1DA] rounded-lg p-2.5 text-sm text-[#2C3639] focus:outline-none focus:ring-1 focus:ring-[#A0937D]">
                        <option value="PvA">Player vs AI (Intercept)</option>
                        <option value="AvA">AI vs AI (Comparison)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold text-[#A0937D] uppercase mb-1">P1 / Your Algorithm</label>
                    <select id="p1Algo" class="w-full bg-[#F5F2EB] border border-[#E6E1DA] rounded-lg p-2.5 text-sm text-[#2C3639] focus:outline-none focus:ring-1 focus:ring-[#A0937D]">
                        <option value="Manual">Manual Arrow Keys</option>
                        <option value="BFS">Breadth-First Search</option>
                        <option value="DFS">Depth-First Search</option>
                        <option value="A*">A* Search</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-semibold text-[#A0937D] uppercase mb-1">Rival Clerk Algorithm</label>
                    <select id="p2Algo" class="w-full bg-[#F5F2EB] border border-[#E6E1DA] rounded-lg p-2.5 text-sm text-[#2C3639] focus:outline-none focus:ring-1 focus:ring-[#A0937D]">
                        <option value="A*" selected>A* Search (Optimal)</option>
                        <option value="BFS">Breadth-First Search</option>
                        <option value="DFS">Depth-First Search</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4 bg-[#F5F2EB] p-4 rounded-xl text-center mb-6">
                    <div>
                        <p class="text-xs text-[#A0937D] uppercase font-semibold">Your Score</p>
                        <p id="pScore" class="text-2xl font-bold text-[#2C3639]">0</p>
                    </div>
                    <div>
                        <p class="text-xs text-[#A0937D] uppercase font-semibold">Rival Score</p>
                        <p id="aScore" class="text-2xl font-bold text-[#E76161]">0</p>
                    </div>
                </div>
            </div>

            <button id="actionBtn" class="w-full bg-[#A0937D] hover:bg-[#8A7D65] text-white font-medium py-3 px-4 rounded-xl transition duration-200">
                Start Next Step
            </button>
        </div>

        <div class="lg:w-2/3 flex items-center justify-center bg-white/70 backdrop-blur-md border border-[#E6E1DA] rounded-3xl p-6 shadow-sm">
            <canvas id="gameCanvas" width="600" height="600" class="rounded-xl cursor-pointer"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
